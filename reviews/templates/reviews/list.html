{% extends 'reviews/base.html' %}

{% block title %}
  All Reviews
{% endblock %}

{% block content %}
  <div class="card">
    <ul>
      {% for review in reviews %}
        <li>
          <h2>{{ review.username }}</h2>
          <p>Rating: ({{ review.rating }} of 5)</p>
          <p>{{ review.feedback }}</p>
        </li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
