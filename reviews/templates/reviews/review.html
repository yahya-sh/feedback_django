{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review</title>
    <link rel="stylesheet" href="{% static 'reviews/styles.css' %}" />
  </head>
  <body>
    <div class="card">
      <h1>Review</h1>
      <form method="POST">
        {% csrf_token %}
        <div class="form-control{% if form.username.errors %} errors{% endif %}">{{ form.username.label_tag }}
          {{ form.username }}
          {{ form.username.errors }}</div>
        <button class="btn">Send</button>
      </form>
    </div>
  </body>
</html>
