{% extends 'base.html' %}
{% block title %}
  Create a Profile
{% endblock %}

{% block content %}
  <div class="card">
    <div class="section-header">
      <h2>Create a Profiel</h2>
      <a href="{% url "profiles:all" %}" class="btn btn-secondary">All Profiles</a>
    </div>
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form }}
      <button class="btn">Upload!</button>
    </form>
  </div>
{% endblock %}
